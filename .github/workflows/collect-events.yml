name: collect-events

on:
  schedule:
    # コスト優先で週1回（月曜 00:00 UTC = 09:00 JST）。頻度はここで調整する。
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write # Workload Identity Federation（OIDC）で GCP に鍵レス認証するため

concurrency:
  group: collect-events
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # secrets は if: で直接参照できないため env に写す（未設定なら空文字）。
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      # WIF 設定（Secret）がある時だけ実行。鍵レスで ADC をセットし、後続ステップが認証情報を拾える。
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_WIF_PROVIDER != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Collect events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 認証は WIF(ADC)。GOOGLE_CALENDAR_ID があれば連携、無ければ NullCalendarSink でスキップ。
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: dotnet run --project src/EventCollector --configuration Release

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.md data runs
          if git diff --cached --quiet; then
            echo "差分なし。コミットしない。"
          else
            git commit -m "chore: update events ($(date -u +%F))"
            git push
          fi
